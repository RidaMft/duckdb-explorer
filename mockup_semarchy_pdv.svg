  <rect class="accent" x="40" y="138" width="110" height="3" rx="1.5"/>

  <!-- Main layout -->
  <rect class="panel" x="20" y="160" width="1400" height="720" rx="12"/>

  <!-- Column headers -->
  <text class="h2" x="50" y="200">SOURCE AVANT (RAW)</text>
  <text class="h2" x="520" y="200">MASTER ENRICHED (ÉDITABLE)</text>
  <text class="h2" x="1030" y="200">APRÈS ENRICHISSEMENT</text>

