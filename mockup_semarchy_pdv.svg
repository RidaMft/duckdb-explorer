  <text class="text" x="1030" y="505">• Développement abréviations</text>
  <text class="text" x="1030" y="525">• Typologie inférée</text>
  <text class="text" x="1030" y="545">• Validation CP/Ville</text>

  <text class="label" x="1020" y="605">Suggestions</text>
  <rect class="ghost" x="1020" y="613" width="360" height="80" rx="8"/>
  <text class="text" x="1030" y="635">Adresse alternative: 185 R LEO LAGRANGE</text>
  <text class="text" x="1030" y="655">Typologie alternative: Restaurant</text>

  <!-- Footer actions -->
