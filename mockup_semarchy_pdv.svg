  <text class="label" x="1020" y="405">Score qualité</text>
  <rect class="ghost" x="1020" y="413" width="120" height="28" rx="6"/>
  <text class="value" x="1030" y="432">0.92</text>

  <text class="label" x="1020" y="455">Règles appliquées</text>
  <rect class="ghost" x="1020" y="463" width="360" height="120" rx="8"/>
