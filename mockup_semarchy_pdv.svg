  <rect class="chip" x="520" y="38" width="120" height="28" rx="14"/>
  <text class="chip-text" x="540" y="57">MASTER</text>
  <rect class="chip" x="650" y="38" width="140" height="28" rx="14"/>
  <text class="chip-text" x="666" y="57">Statut: GOLDEN</text>
  <rect class="chip" x="800" y="38" width="220" height="28" rx="14"/>
  <text class="chip-text" x="815" y="57">Dernière MAJ: 2026-02-17</text>

  <!-- Actions -->
  <rect class="action" x="1090" y="34" width="140" height="36" rx="8"/>
  <text class="action-text" x="1118" y="57">Enregistrer</text>
  <rect class="ghost" x="1240" y="34" width="160" height="36" rx="8"/>
  <text class="label" x="1268" y="57">Voir Source</text>

  <!-- Tabs -->
  <rect class="panel" x="20" y="105" width="1400" height="42" rx="8"/>
  <text class="label" x="40" y="132">Point de Vente</text>
  <text class="text" x="170" y="132">Métadonnée</text>
  <text class="text" x="280" y="132">Identifiant Juridique</text>
