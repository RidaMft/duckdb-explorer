<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f7f5f2; }
      .panel { fill: #ffffff; stroke: #ded8d0; stroke-width: 1; }
      .panel-muted { fill: #faf8f4; stroke: #ded8d0; stroke-width: 1; }
      .title { font: 600 18px 'Segoe UI', Tahoma, sans-serif; fill: #2b2b2b; }
      .h1 { font: 700 22px 'Segoe UI', Tahoma, sans-serif; fill: #1f1f1f; }
      .h2 { font: 600 16px 'Segoe UI', Tahoma, sans-serif; fill: #1f1f1f; }
      .label { font: 600 12px 'Segoe UI', Tahoma, sans-serif; fill: #4a4a4a; }
      .text { font: 400 12px 'Segoe UI', Tahoma, sans-serif; fill: #4a4a4a; }
      .value { font: 600 12px 'Segoe UI', Tahoma, sans-serif; fill: #1f1f1f; }
      .chip { fill: #e9eef2; stroke: #c7d1d9; stroke-width: 1; }
      .chip-text { font: 600 11px 'Segoe UI', Tahoma, sans-serif; fill: #2f3a45; }
      .action { fill: #2f6f5f; }
      .action-text { font: 600 12px 'Segoe UI', Tahoma, sans-serif; fill: #ffffff; }
      .divider { stroke: #e3ded7; stroke-width: 1; }
      .soft { fill: #f2eee8; }
      .accent { fill: #f0c64d; }
      .ghost { fill: #ffffff; stroke: #b9b3ab; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="1440" height="900"/>

  <!-- Top bar -->
