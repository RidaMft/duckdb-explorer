  <rect class="ghost" x="520" y="563" width="200" height="28" rx="6"/>
  <text class="value" x="530" y="582">59500 DOUAI</text>

  <text class="label" x="520" y="605">Coordonnées</text>
  <rect class="ghost" x="520" y="613" width="420" height="28" rx="6"/>
  <text class="text" x="530" y="632">Email / Téléphone / Fax</text>

  <!-- After enrichment -->
  <text class="label" x="1020" y="255">Nom standardisé</text>
  <rect class="ghost" x="1020" y="263" width="360" height="28" rx="6"/>
  <text class="value" x="1030" y="282">BRASSERIE ANGELUS</text>

  <text class="label" x="1020" y="305">Adresse standardisée</text>
  <rect class="ghost" x="1020" y="313" width="360" height="28" rx="6"/>
  <text class="value" x="1030" y="332">185 RUE LEO LAGRANGE</text>

  <text class="label" x="1020" y="355">Référentiel</text>
  <rect class="ghost" x="1020" y="363" width="200" height="28" rx="6"/>
