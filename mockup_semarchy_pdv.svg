  <rect class="ghost" x="520" y="463" width="70" height="28" rx="14"/>
  <circle cx="535" cy="477" r="10" fill="#c0c0c0"/>

  <text class="label" x="520" y="505">Adresse Standardisée</text>
  <rect class="ghost" x="520" y="513" width="420" height="28" rx="6"/>
  <text class="value" x="530" y="532">185 RUE LEO LAGRANGE</text>

