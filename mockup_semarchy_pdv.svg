  <text class="label" x="520" y="255">Code C10</text>
  <rect class="ghost" x="520" y="263" width="200" height="28" rx="6"/>
  <text class="value" x="530" y="282">2200021119</text>

  <text class="label" x="520" y="305">Nom Principal</text>
  <rect class="ghost" x="520" y="313" width="420" height="28" rx="6"/>
  <text class="value" x="530" y="332">BRASSERIE ANGELUS</text>

  <text class="label" x="520" y="355">Nom Secondaire</text>
  <rect class="ghost" x="520" y="363" width="420" height="28" rx="6"/>
  <text class="value" x="530" y="382">BRASSERIE ANGELUS</text>

  <text class="label" x="520" y="405">Typologie</text>
  <rect class="ghost" x="520" y="413" width="200" height="28" rx="6"/>
  <text class="value" x="530" y="432">Brasserie</text>

  <text class="label" x="740" y="405">Type</text>
  <rect class="ghost" x="740" y="413" width="200" height="28" rx="6"/>
  <text class="value" x="750" y="432">CHR</text>

